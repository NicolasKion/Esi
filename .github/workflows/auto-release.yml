name: Auto-release dependency updates

# Auto-merged Dependabot PRs are merged with GITHUB_TOKEN, so the resulting
# push to main cannot trigger a release workflow directly (GitHub suppresses
# workflow runs for GITHUB_TOKEN events). A schedule sidesteps that: once a
# day, if everything on main since the last tag came from bots and composer
# dependencies changed, cut the next patch release.

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Decide whether to release
        id: decide
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            echo "No tags found, nothing to base a release on"
            exit 0
          fi
          echo "Latest tag: $latest"

          if [ -z "$(git rev-list "$latest"..HEAD)" ]; then
            echo "No commits since $latest"
            exit 0
          fi

          # Only release automatically when every commit since the last tag
          # came from a bot; pending human work gets released by a human, who
          # also decides whether it warrants more than a patch bump.
          humans=$(git log "$latest"..HEAD --format='%an' | sort -u | grep -vE '^(dependabot\[bot\]|github-actions(\[bot\])?|GitHub)$' || true)
          if [ -n "$humans" ]; then
            echo "Human commits present since $latest (by: $humans), skipping auto-release"
            exit 0
          fi

          # GitHub Actions bumps don't affect package consumers; only release
          # when composer dependencies changed.
          if ! git diff --name-only "$latest"..HEAD | grep -qx 'composer.json'; then
            echo "No composer.json changes since $latest, skipping auto-release"
            exit 0
          fi

          version=${latest#v}
          IFS=. read -r major minor patch <<< "$version"
          tag="v$major.$minor.$((${patch:-0} + 1))"
          echo "Releasing $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  release:
    needs: check
    if: needs.check.outputs.tag != ''
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.check.outputs.tag }}
